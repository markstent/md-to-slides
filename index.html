<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>md-to-slides</title>
  <link rel="stylesheet" href="styles/base.css" />
  <link rel="stylesheet" href="styles/themes.css" />
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/highlight.js@11.11.1/styles/github.min.css"
  />
  <script type="importmap">
    {
      "imports": {
        "marked": "https://esm.sh/marked@12.0.2",
        "marked-highlight": "https://esm.sh/marked-highlight@2.2.4",
        "highlight.js": "https://esm.sh/highlight.js@11.11.1"
      }
    }
  </script>
</head>
<body>
  <main class="app">
    <textarea
      id="editor"
      class="editor"
      spellcheck="false"
      placeholder="Type Markdown. Separate slides with a line containing only ---"
    ></textarea>
    <div class="preview" id="preview">
      <div class="toolbar" style="display:flex; gap:.5rem; align-items:center; position:sticky; top:0;">
        <label for="theme-select">Theme</label>
        <select id="theme-select"></select>
      </div>
      <div id="slides" style="display:flex; flex-direction:column; gap:1.5rem;"></div>
    </div>
  </main>
  <script type="module" src="src/main.js"></script>
</body>
</html>
